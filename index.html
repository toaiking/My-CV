/* LANG TOGGLE */
.lang-toggle{position:fixed;top:1.2rem;right:1.5rem;z-index:200;display:flex;gap:.3rem}
.lang-btn{font-family:'Space Mono',monospace;font-size:.58rem;letter-spacing:.12em;padding:.3rem .65rem;border-radius:4px;border:1px solid var(--border);background:rgba(4,5,13,.7);color:var(--muted);cursor:pointer;transition:all .2s;backdrop-filter:blur(10px)}
.lang-btn.on{background:rgba(94,207,255,.1);border-color:rgba(94,207,255,.35);color:var(--c1)}
.lang-btn:hover:not(.on){color:var(--text);border-color:var(--border-hi)}

/* TABS */
.tab-bar{position:sticky;top:0;z-index:100;background:rgba(4,5,13,.9);backdrop-filter:blur(24px);border-bottom:1px solid var(--border)}
.tab-bar-inner{max-width:1020px;margin:0 auto;display:flex;align-items:center;padding:0 3rem}
.tb{position:relative;font-family:'Space Mono',monospace;font-size:.59rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);background:none;border:none;cursor:pointer;padding:1.25rem 1.5rem;transition:color .3s;white-space:nowrap}
.tb::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--c1),var(--c2));transform:scaleX(0);transition:transform .35s cubic-bezier(.23,1,.32,1)}
.tb:hover{color:var(--text)}
.tb.on{color:var(--text)}
.tb.on::after{transform:scaleX(1)}
.tsep{width:1px;height:18px;background:var(--border)}

/* MAIN */
.main{position:relative;z-index:5;max-width:1020px;margin:0 auto;padding:3rem 3rem 6rem}
.pane{display:none}
.pane.on{display:block;animation:fadeUp .5s ease both}

/* SEC */
.sec{margin-bottom:3rem}
.sec-h{font-family:'Space Mono',monospace;font-size:.56rem;letter-spacing:.3em;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:1rem;margin-bottom:1.6rem}
.sec-h::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border-hi),transparent)}

/* METRICS */
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:3rem}
.mbox{background:var(--surf);border:1px solid var(--border);border-radius:12px;padding:1.4rem 1rem;text-align:center;position:relative;overflow:hidden;transition:transform .35s,border-color .3s}
.mbox:hover{transform:translateY(-5px);border-color:var(--border-hi)}
.mbox::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% -10%,rgba(94,207,255,.07),transparent 65%)}
.mnum{font-family:'Cormorant Garamond',serif;font-size:2.3rem;font-weight:700;display:block;margin-bottom:.3rem;line-height:1}
.mlbl{font-family:'Space Mono',monospace;font-size:.51rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}

/* SUMMARY */
.sumcard{position:relative;background:var(--surf);border:1px solid var(--border);border-radius:14px;padding:2.2rem;overflow:hidden}
.sumcard::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--c1) 40%,var(--c2) 60%,transparent);animation:holo 5s ease infinite;background-size:200% 200%}
.sumcard::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 50% 100% at 0% 50%,rgba(94,207,255,.03),transparent 70%);pointer-events:none}
.sumtext{font-family:'Cormorant Garamond',serif;font-size:1.16rem;font-weight:300;line-height:1.9;color:rgba(238,234,224,.93)}
.sumtext strong{color:var(--gold2);font-weight:500}

/* ── PORTFOLIO BENTO — DESKTOP ── */
.pbento{
  display:grid;
  grid-template-columns:1.5fr 1fr 1fr;
  grid-template-rows:240px 160px;
  gap:.7rem;
}
/* desktop slot positions */
.pbento .ps:nth-child(1){ grid-column:1;   grid-row:1/3; } /* tall dominant — left  */
.pbento .ps:nth-child(2){ grid-column:2;   grid-row:1;   } /* top center            */
.pbento .ps:nth-child(3){ grid-column:3;   grid-row:1;   } /* top right             */
.pbento .ps:nth-child(4){ grid-column:2/4; grid-row:2;   } /* wide bottom strip     */

/* ── TABLET ── */
@media(max-width:860px){
  .pbento{
    grid-template-columns:1fr 1fr;
    grid-template-rows:200px 150px 130px;
    gap:.6rem;
  }
  .pbento .ps:nth-child(1){ grid-column:1;   grid-row:1/3; } /* tall left             */
  .pbento .ps:nth-child(2){ grid-column:2;   grid-row:1;   } /* top right             */
  .pbento .ps:nth-child(3){ grid-column:2;   grid-row:2;   } /* mid right             */
  .pbento .ps:nth-child(4){ grid-column:1/3; grid-row:3;   } /* full-width strip      */
}

/* ── MOBILE ── */
@media(max-width:520px){
  .pbento{
    grid-template-columns:1fr 1fr;
    grid-template-rows:160px 110px 80px;
    gap:.5rem;
  }
  .pbento .ps:nth-child(1){ grid-column:1/3; grid-row:1;   } /* full-width hero       */
  .pbento .ps:nth-child(2){ grid-column:1;   grid-row:2;   } /* small left            */
  .pbento .ps:nth-child(3){ grid-column:2;   grid-row:2;   } /* small right           */
  .pbento .ps:nth-child(4){ grid-column:1/3; grid-row:3;   } /* panoramic strip       */
}

.ps{
  position:relative;border-radius:10px;overflow:hidden;
  background:var(--surf2);border:1px solid var(--border);
  cursor:pointer;
  transition:border-color .4s,box-shadow .4s;
}
.ps:hover{
  border-color:rgba(94,207,255,.38);
  box-shadow:0 12px 40px rgba(0,0,0,.5),0 0 20px rgba(94,207,255,.08);
  z-index:2;
}
.ps img{
  width:100%;height:100%;object-fit:cover;display:block;
  transition:transform .7s cubic-bezier(.23,1,.32,1),filter .4s;
}
.ps:hover img{ transform:scale(1.07); filter:brightness(1.08); }

/* empty slot */
.ps-empty{
  position:absolute;inset:0;
  background:repeating-linear-gradient(
    45deg,
    rgba(94,207,255,.015) 0px,rgba(94,207,255,.015) 1px,
    transparent 1px,transparent 18px
  );
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.55rem;
}
.ps-empty-ring{
  width:44px;height:44px;border-radius:50%;
  border:1px dashed rgba(94,207,255,.18);
  display:flex;align-items:center;justify-content:center;
  color:rgba(94,207,255,.2);font-size:1.2rem;
  transition:all .35s;
}
.ps:hover .ps-empty-ring{ border-color:rgba(94,207,255,.5);color:rgba(94,207,255,.55); }
.ps-empty-txt{
  font-family:'Space Mono',monospace;font-size:.46rem;letter-spacing:.14em;
  text-transform:uppercase;color:rgba(255,255,255,.1);
  transition:color .3s;
}
.ps:hover .ps-empty-txt{ color:rgba(94,207,255,.4); }

/* gradient overlay */
.ps-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to bottom, rgba(4,5,13,0) 40%, rgba(4,5,13,.78) 100%);
  pointer-events:none;
}
/* caption */
.ps-cap{
  position:absolute;bottom:0;left:0;right:0;
  padding:.6rem .75rem;
  transform:translateY(4px);opacity:0;
  transition:transform .35s cubic-bezier(.23,1,.32,1),opacity .3s;
  pointer-events:none;
}
.ps:hover .ps-cap{ transform:translateY(0);opacity:1; }
/* on touch devices — always show caption */
@media(hover:none){
  .ps-cap{ opacity:1;transform:translateY(0); }
}
.ps-cap-tag{
  font-family:'Space Mono',monospace;font-size:.47rem;letter-spacing:.14em;
  text-transform:uppercase;color:var(--gold);line-height:1;
}
/* index number */
.ps-num{
  position:absolute;top:.55rem;right:.6rem;
  font-family:'Space Mono',monospace;font-size:.46rem;letter-spacing:.06em;
  color:rgba(255,255,255,.28);pointer-events:none;
}

/* ── LIGHTBOX ── */
.lb{
  position:fixed;inset:0;z-index:1000;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:rgba(3,4,11,0);backdrop-filter:blur(0px);
  pointer-events:none;
  transition:background .38s,backdrop-filter .38s;
}
.lb.open{
  background:rgba(3,4,11,.95);backdrop-filter:blur(28px) saturate(160%);
  pointer-events:all;
}
/* close */
.lb-close{
  position:absolute;top:1.3rem;right:1.5rem;z-index:10;
  width:36px;height:36px;border-radius:50%;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
  color:rgba(255,255,255,.6);font-size:.85rem;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;backdrop-filter:blur(8px);
  opacity:0;transition:opacity .3s,background .2s,color .2s,transform .25s;
}
.lb.open .lb-close{opacity:1;}
.lb-close:hover{background:rgba(255,80,80,.18);color:white;transform:rotate(90deg);}

/* stage — click left half = prev, right half = next */
.lb-stage{
  position:relative;
  display:flex;align-items:center;justify-content:center;
  flex:1;width:100%;max-height:78vh;
  cursor:pointer;
}
/* click zones — invisible, split image in half */
.lb-zone{
  position:absolute;top:0;bottom:0;width:50%;z-index:5;
  cursor:pointer;
}
.lb-zone-l{left:0;}
.lb-zone-r{right:0;}

.lb-img-wrap{
  position:relative;
  border-radius:10px;overflow:hidden;
  border:1px solid rgba(255,255,255,.07);
  box-shadow:0 48px 128px rgba(0,0,0,.85),0 0 60px rgba(94,207,255,.05);
  transform:scale(.9) translateY(10px);opacity:0;
  transition:transform .48s cubic-bezier(.23,1,.32,1),opacity .38s;
  pointer-events:none;/* zones handle clicks */
}
.lb.open .lb-img-wrap{transform:scale(1) translateY(0);opacity:1;}
.lb-img-wrap img{
  display:block;
  max-width:min(86vw,960px);
  max-height:72vh;
  width:auto;height:auto;object-fit:contain;
}
.lb-img-wrap .lb-empty{
  width:520px;max-width:80vw;height:300px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.8rem;
  background:var(--surf2);
  color:var(--muted);font-family:'Space Mono',monospace;
  font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;
}

/* bottom bar: caption + dots + counter */
.lb-bar{
  display:flex;flex-direction:column;align-items:center;gap:.7rem;
  padding:1rem 0 1.6rem;width:100%;
  opacity:0;transform:translateY(8px);
  transition:opacity .4s .12s,transform .4s .12s;
}
.lb.open .lb-bar{opacity:1;transform:translateY(0);}

/* dot indicators */
.lb-dots{display:flex;gap:.45rem;align-items:center;}
.lb-dot{
  width:6px;height:6px;border-radius:50%;
  background:rgba(255,255,255,.18);
  border:1px solid transparent;
  cursor:pointer;
  transition:background .25s,transform .25s,border-color .25s;
}
.lb-dot:hover{background:rgba(255,255,255,.45);}
.lb-dot.cur{
  background:var(--c1);
  border-color:rgba(94,207,255,.4);
  transform:scale(1.4);
}
/* caption row */
.lb-meta{
  display:flex;align-items:center;gap:1.5rem;
}
.lb-caption{
  font-family:'Space Mono',monospace;font-size:.57rem;
  letter-spacing:.14em;text-transform:uppercase;color:var(--gold);
}
.lb-counter{
  font-family:'Space Mono',monospace;font-size:.5rem;
  color:var(--muted);letter-spacing:.06em;
}

/* SKILLS */
.sgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:1rem}
.sgroup{background:var(--surf);border:1px solid var(--border);border-radius:12px;padding:1.3rem;transition:border-color .3s,transform .3s}
.sgroup:hover{border-color:rgba(200,169,110,.3);transform:translateY(-4px)}
.sgname{font-family:'Space Mono',monospace;font-size:.56rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:.85rem}
.stags{display:flex;flex-wrap:wrap;gap:.35rem}
.stag{font-size:.71rem;font-weight:500;padding:.2rem .55rem;border-radius:4px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);color:rgba(238,234,224,.8);transition:all .2s;cursor:default}
.stag:hover{background:rgba(94,207,255,.1);border-color:rgba(94,207,255,.3);color:var(--c1)}
.stag.h{background:rgba(200,169,110,.1);border-color:rgba(200,169,110,.3);color:var(--gold2)}

/* EXPERIENCE */
.eitem{position:relative;padding:2rem;background:var(--surf);border:1px solid var(--border);border-radius:14px;margin-bottom:1.2rem;overflow:hidden;transition:border-color .3s,transform .3s,box-shadow .3s}
.eitem:hover{border-color:rgba(94,207,255,.18);transform:translateX(5px);box-shadow:0 8px 36px rgba(0,0,0,.28)}
.eitem::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,var(--c1),var(--c2));border-radius:0 3px 3px 0;opacity:0;transition:opacity .3s}
.eitem:hover::before{opacity:1}
.ehead{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:.6rem;margin-bottom:.4rem}
.erole{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:500}
.eperiod{font-family:'Space Mono',monospace;font-size:.61rem;letter-spacing:.1em;color:var(--c1);background:rgba(94,207,255,.08);padding:.25rem .75rem;border-radius:100px;border:1px solid rgba(94,207,255,.2);white-space:nowrap}
.eco{font-size:.77rem;color:var(--gold);font-weight:600;letter-spacing:.04em;margin-bottom:1.1rem}
.ebl{list-style:none}
.ebl li{position:relative;padding-left:1.4rem;margin-bottom:.55rem;font-size:.86rem;line-height:1.75;color:rgba(238,234,224,.82)}
.ebl li::before{content:'›';position:absolute;left:0;color:var(--c1);font-size:1.05rem;font-weight:700;line-height:1.58}
.ebl li strong{color:var(--text);font-weight:600}
.kpi{display:inline-block;font-family:'Space Mono',monospace;font-size:.67rem;font-weight:700;background:linear-gradient(135deg,rgba(94,207,255,.15),rgba(255,110,199,.1));color:var(--c1);border:1px solid rgba(94,207,255,.28);padding:.07rem .44rem;border-radius:3px;letter-spacing:.04em}
.kpig{display:inline-block;font-family:'Space Mono',monospace;font-size:.67rem;font-weight:700;background:rgba(200,169,110,.12);color:var(--gold2);border:1px solid rgba(200,169,110,.28);padding:.07rem .44rem;border-radius:3px}

/* PROJECTS */
.pgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(228px,1fr));gap:1rem}
.pcard{position:relative;background:var(--surf);border:1px solid var(--border);border-radius:14px;padding:1.5rem;overflow:hidden;transition:transform .4s cubic-bezier(.23,1,.32,1),border-color .3s,box-shadow .3s;cursor:default}
.pcard:hover{transform:translateY(-9px);border-color:rgba(200,169,110,.38);box-shadow:0 24px 60px rgba(0,0,0,.5),0 0 28px rgba(200,169,110,.07)}
.pcard::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--c1),var(--c2),var(--gold));background-size:200% 100%;animation:holo 3s ease infinite}
.pbadge{font-family:'Space Mono',monospace;font-size:.53rem;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);background:rgba(200,169,110,.08);border:1px solid rgba(200,169,110,.2);padding:.18rem .5rem;border-radius:3px;display:inline-block;margin-bottom:.75rem}
.pname{font-family:'Cormorant Garamond',serif;font-size:1.05rem;font-weight:500;margin-bottom:.6rem}
.pdesc{font-size:.79rem;line-height:1.68;color:var(--muted2)}
.presult{margin-top:.75rem;font-family:'Space Mono',monospace;font-size:.62rem;color:var(--c3);letter-spacing:.03em}
.pcorner{position:absolute;bottom:.8rem;right:.8rem;width:18px;height:18px;border-right:1.5px solid rgba(94,207,255,.22);border-bottom:1.5px solid rgba(94,207,255,.22)}

/* EDUCATION */
.edrow{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;padding:1.1rem 0;border-bottom:1px solid var(--border)}
.edrow:last-child{border:none}
.eddeg{font-size:.9rem;font-weight:600}
.edsch{font-size:.77rem;color:var(--muted2);margin-top:.2rem}
.edyr{font-family:'Space Mono',monospace;font-size:.66rem;color:var(--c2);background:rgba(255,110,199,.07);border:1px solid rgba(255,110,199,.2);padding:.2rem .6rem;border-radius:100px;white-space:nowrap}

/* ATS NOTE */
.ats-note{display:flex;gap:.8rem;background:rgba(109,255,160,.04);border:1px solid rgba(109,255,160,.17);border-radius:10px;padding:.9rem 1.2rem;margin-bottom:2rem;font-size:.8rem;color:var(--c3);line-height:1.65}
.aks{background:rgba(94,207,255,.1);border-radius:2px;padding:0 2px;color:var(--c1)}
.ats-plain{font-size:.86rem;line-height:1.88;color:rgba(238,234,224,.9)}
.ats-plain strong{color:var(--gold2)}

/* FOOTER */
.foot{position:relative;z-index:5;text-align:center;padding:2.2rem;border-top:1px solid var(--border);font-family:'Space Mono',monospace;font-size:.53rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)}
.foot::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:36%;height:1px;background:linear-gradient(90deg,transparent,var(--c1),var(--c2),transparent)}

/* RESPONSIVE — GLOBAL */
@media(max-width:768px){
  .site-header{padding:2.5rem 1.4rem 2rem}
  .header-inner{grid-template-columns:1fr}
  .contact-grid{align-items:flex-start}
  .ci{justify-content:flex-start}
  .main{padding:2rem 1.4rem 4rem}
  .tab-bar-inner{padding:0 .8rem}
  .tb{padding:1.1rem .9rem;font-size:.54rem}
  .metrics{grid-template-columns:repeat(2,1fr)}
  .h-name{font-size:2.5rem}
  .lang-toggle{top:.8rem;right:1rem}
  /* lightbox on mobile */
  .lb-img-wrap img{max-width:96vw;max-height:60vh}
  .lb-bar{padding:.7rem 0 1rem}
  .lb-stage{max-height:65vh}
}
</style>
</head>
<body>

<!-- FX LAYERS -->
<div class="noise"></div>
<div class="grid-bg"></div>
<div class="blobs"><div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div></div>
<div class="wires"><div class="wire w1"></div><div class="wire w2"></div><div class="wire w3"></div><div class="wire w4"></div></div>
<div class="scanline"></div>

<!-- LANGUAGE TOGGLE -->
<div class="lang-toggle">
  <button class="lang-btn on" id="btn-vi" onclick="setLang('vi')">VI</button>
  <button class="lang-btn"    id="btn-en" onclick="setLang('en')">EN</button>
</div>

<!-- HEADER (rendered by JS) -->
<header class="site-header" id="site-header"></header>

<!-- TABS -->
<nav class="tab-bar">
  <div class="tab-bar-inner">
    <button class="tb on" id="tab-hm"  onclick="setTab('hm',this)"></button>
    <div class="tsep"></div>
    <button class="tb"    id="tab-ats" onclick="setTab('ats',this)"></button>
  </div>
</nav>

<main class="main">
  <div id="hm"  class="pane on"></div>
  <div id="ats" class="pane"></div>
</main>

<footer class="foot" id="foot"></footer>

<script>
/* ─── STATE ─── */
let LANG = CONFIG.defaultLang;

/* ─── HELPERS ─── */
const L  = (obj) => typeof obj === 'object' ? (obj[LANG] || obj.vi || obj.en) : obj;
const $  = (id)  => document.getElementById(id);
const el = (tag, cls, html) => { const e=document.createElement(tag); if(cls)e.className=cls; if(html)e.innerHTML=html; return e; };

// Parse inline <kpi> and <kpig> tags in bullet strings
function parseBullet(str){
  return str
    .replace(/<kpi>(.*?)<\/kpi>/g, '<span class="kpi">$1</span>')
    .replace(/<kpig>(.*?)<\/kpig>/g, '<span class="kpig">$1</span>');
}

/* ─── RENDER HEADER ─── */
function renderHeader(){
  const p = CONFIG.personal;
  const loc  = LANG==='vi' ? p.locationVI : p.locationEN;
  const stat = L(p.status);
  const firstName = LANG==='vi' ? p.lastName.split(' ').slice(-1)[0] : p.firstName;
  const lastName  = LANG==='vi' ? p.lastName.split(' ').slice(0,-1).join(' ') || p.lastName : p.lastName;

  $('site-header').innerHTML = `
    <div class="header-inner">
      <div>
        <div class="chip"><span class="chip-dot"></span>${stat}</div>
        <h1 class="h-name"><em>${LANG==='vi'?p.lastName:p.firstName}</em> <span class="holo">${LANG==='vi'?p.firstName:p.lastName}</span></h1>
        <div class="h-title"><span class="gold">${LANG==='vi'?p.titleVI.split('·')[0].trim():p.titleEN.split('·')[0].trim()}</span>&nbsp;&nbsp;·&nbsp;&nbsp;${(LANG==='vi'?p.titleVI:p.titleEN).split('·').slice(1).join('·').trim()}</div>
      </div>
      <div class="contact-grid">
        <div class="ci"><span>📍</span><span>${loc}</span></div>
        <div class="ci"><span>✉</span><a href="mailto:${p.email}">${p.email}</a></div>
        <div class="ci"><span>🔗</span><a href="https://${p.linkedin}" target="_blank">${p.linkedin}</a></div>
        <div class="ci"><span>🎨</span><a href="https://${p.portfolio}" target="_blank">${p.portfolio}</a></div>
        <div class="ci"><span>📞</span><span>${p.phone}</span></div>
      </div>
    </div>`;
}

/* ─── RENDER PANE HM ─── */
function renderHM(){
  const ui = CONFIG.ui;
  let html = '';

  // METRICS
  html += '<div class="metrics">';
  CONFIG.metrics.forEach(m=>{
    const lbl = LANG==='vi' ? m.labelVI : m.labelEN;
    const colClass = ['holo','','gold',''][CONFIG.metrics.indexOf(m)] || '';
    const colStyle = CONFIG.metrics.indexOf(m)===1?'style="color:var(--c2)"':CONFIG.metrics.indexOf(m)===3?'style="color:var(--c3)"':'';
    html += `<div class="mbox"><span class="mnum ${colClass}" ${colStyle}>${m.num}</span><span class="mlbl">${lbl}</span></div>`;
  });
  html += '</div>';

  // SUMMARY
  html += `<section class="sec"><div class="sec-h">${L(ui.secSummary)}</div>
    <div class="sumcard"><p class="sumtext">${L(CONFIG.summary)}</p></div></section>`;

  // PORTFOLIO — editorial bento
  html += `<section class="sec"><div class="sec-h">${L(ui.secPortfolio)}</div><div class="pbento">`;
  CONFIG.portfolio.forEach((p,i)=>{
    const cap = LANG==='vi' ? p.captionVI : p.captionEN;
    if(p.url){
      html += `<div class="ps" onclick="lbOpen(${i})">
        <img src="${p.url}" alt="${cap}" loading="lazy">
        <div class="ps-overlay"></div>
        <div class="ps-cap"><div class="ps-cap-tag">${cap}</div></div>
        <div class="ps-num">0${i+1}</div>
      </div>`;
    } else {
      html += `<div class="ps" onclick="lbOpen(${i})">
        <div class="ps-empty">
          <div class="ps-empty-ring">+</div>
          <div class="ps-empty-txt">${cap}</div>
        </div>
        <div class="ps-num">0${i+1}</div>
      </div>`;
    }
  });
  html += '</div></section>';

  // SKILLS
  html += `<section class="sec"><div class="sec-h">${L(ui.secSkills)}</div><div class="sgrid">`;
  CONFIG.skills.forEach(g=>{
    const gname = LANG==='vi' ? g.nameVI : g.nameEN;
    html += `<div class="sgroup"><div class="sgname">${gname}</div><div class="stags">`;
    g.tags.forEach(t => { html += `<span class="stag${t.hot?' h':''}">${t.label}</span>`; });
    html += '</div></div>';
  });
  html += '</div></section>';

  // EXPERIENCE
  html += `<section class="sec"><div class="sec-h">${L(ui.secExperience)}</div>`;
  CONFIG.experience.forEach(exp=>{
    const role   = LANG==='vi' ? exp.roleVI     : exp.roleEN;
    const loc    = LANG==='vi' ? exp.locationVI : exp.locationEN;
    const bullets= LANG==='vi' ? exp.bulletsVI  : exp.bulletsEN;
    html += `<div class="eitem">
      <div class="ehead"><div class="erole">${role}</div><div class="eperiod">${exp.period}</div></div>
      <div class="eco">${exp.company} · ${loc}</div><ul class="ebl">`;
    bullets.forEach(b => { html += `<li>${parseBullet(b)}</li>`; });
    html += '</ul></div>';
  });
  html += '</section>';

  // PROJECTS
  html += `<section class="sec"><div class="sec-h">${L(ui.secProjects)}</div><div class="pgrid">`;
  CONFIG.projects.forEach(p=>{
    const badge  = LANG==='vi' ? p.badgeVI  : p.badgeEN;
    const name   = LANG==='vi' ? p.nameVI   : p.nameEN;
    const desc   = LANG==='vi' ? p.descVI   : p.descEN;
    const result = LANG==='vi' ? p.resultVI : p.resultEN;
    html += `<div class="pcard">
      <div class="pbadge">${badge}</div>
      <div class="pname">${name}</div>
      <div class="pdesc">${desc}</div>
      <div class="presult">${result}</div>
      <div class="pcorner"></div></div>`;
  });
  html += '</div></section>';

  // EDUCATION
  html += `<section class="sec"><div class="sec-h">${L(ui.secEducation)}</div>`;
  CONFIG.education.forEach(e=>{
    const deg = LANG==='vi' ? e.degreeVI : e.degreeEN;
    const sch = LANG==='vi' ? e.schoolVI : e.schoolEN;
    html += `<div class="edrow"><div><div class="eddeg">${deg}</div><div class="edsch">${sch}</div></div><div class="edyr">${e.year}</div></div>`;
  });
  html += '</section>';

  $('hm').innerHTML = html;
  attachTilt();
}

/* ─── RENDER PANE ATS ─── */
function renderATS(){
  const ui = CONFIG.ui;
  let html = '';

  // ATS NOTE
  html += `<div class="ats-note"><span style="font-size:1rem;flex-shrink:0">🤖</span><div>${L(ui.atsNote)}</div></div>`;

  // SUMMARY
  const sumText = L(CONFIG.summary).replace(/<strong>/g,'').replace(/<\/strong>/g,'');
  html += `<section class="sec"><div class="sec-h">${L(ui.secSummary)}</div>
    <div class="eitem" style="border-left:3px solid var(--c1)"><p class="ats-plain">${sumText}</p></div></section>`;

  // TECH SKILLS (flat list)
  html += `<section class="sec"><div class="sec-h">${L(ui.secTechSkills)}</div><div class="eitem"><div style="font-size:.85rem;line-height:2.1">`;
  CONFIG.skills.forEach(g=>{
    const gname = LANG==='vi' ? g.nameVI : g.nameEN;
    const tagList = g.tags.map(t=>t.label).join(', ');
    html += `<p><strong style="color:var(--gold)">${gname}:</strong> ${tagList}</p>`;
  });
  html += '</div></div></section>';

  // EXPERIENCE
  html += `<section class="sec"><div class="sec-h">${L(ui.secExperience)}</div>`;
  CONFIG.experience.forEach(exp=>{
    const role   = LANG==='vi' ? exp.roleVI     : exp.roleEN;
    const loc    = LANG==='vi' ? exp.locationVI : exp.locationEN;
    const bullets= LANG==='vi' ? exp.bulletsVI  : exp.bulletsEN;
    html += `<div class="eitem" style="margin-bottom:1rem">
      <div class="ehead"><div class="erole">${role}</div><div class="eperiod">${exp.period}</div></div>
      <div class="eco">${exp.company} · ${loc}</div><ul class="ebl">`;
    bullets.forEach(b=>{ html += `<li>${parseBullet(b)}</li>`; });
    html += '</ul></div>';
  });
  html += '</section>';

  // PROJECTS (flat)
  html += `<section class="sec"><div class="sec-h">${L(ui.secProjects)}</div><div class="eitem"><ul class="ebl">`;
  CONFIG.projects.forEach(p=>{
    const name   = LANG==='vi' ? p.nameVI   : p.nameEN;
    const desc   = LANG==='vi' ? p.descVI   : p.descEN;
    const result = LANG==='vi' ? p.resultVI : p.resultEN;
    html += `<li><strong>${name}:</strong> ${desc} <span class="kpi">${result}</span></li>`;
  });
  html += '</ul></div></section>';

  // EDUCATION
  html += `<section class="sec"><div class="sec-h">${L(ui.secEducation)}</div>`;
  CONFIG.education.forEach(e=>{
    const deg = LANG==='vi' ? e.degreeVI : e.degreeEN;
    const sch = LANG==='vi' ? e.schoolVI : e.schoolEN;
    html += `<div class="edrow"><div><div class="eddeg">${deg}</div><div class="edsch">${sch}</div></div><div class="edyr">${e.year}</div></div>`;
  });
  html += '</section>';

  $('ats').innerHTML = html;
}

/* ─── RENDER TABS LABELS ─── */
function renderTabLabels(){
  const ui = CONFIG.ui;
  $('tab-hm').textContent  = L(ui.tabPortfolio);
  $('tab-ats').textContent = L(ui.tabATS);
}

/* ─── RENDER FOOTER ─── */
function renderFooter(){
  const p = CONFIG.personal;
  const name = `${p.lastName} ${p.firstName}`;
  const title = LANG==='vi' ? p.titleVI.split('·')[0].trim() : p.titleEN.split('·')[0].trim();
  $('foot').textContent = `${name} · ${title} · 2025`;
}

/* ─── FULL RENDER ─── */
function renderAll(){
  renderHeader();
  renderTabLabels();
  renderHM();
  renderATS();
  renderFooter();
  // restore active tab visual
  document.querySelectorAll('.tb').forEach(b=>b.classList.remove('on'));
  const activeId = document.querySelector('.pane.on').id;
  $('tab-'+activeId).classList.add('on');
}

/* ─── LANGUAGE SWITCH ─── */
function setLang(lang){
  LANG = lang;
  $('btn-vi').classList.toggle('on', lang==='vi');
  $('btn-en').classList.toggle('on', lang==='en');
  renderAll();
}

/* ─── TAB SWITCH ─── */
function setTab(id, btn){
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.tb').forEach(b=>b.classList.remove('on'));
  $(id).classList.add('on');
  btn.classList.add('on');
  window.scrollTo({top:document.querySelector('.tab-bar').offsetTop-1,behavior:'smooth'});
}

/* ─── 3D TILT ─── */
function attachTilt(){
  document.querySelectorAll('.pcard').forEach(c=>{
    c.addEventListener('mousemove',e=>{
      const r=c.getBoundingClientRect();
      const x=((e.clientX-r.left)/r.width-.5)*14;
      const y=((e.clientY-r.top)/r.height-.5)*-14;
      c.style.transform=`translateY(-9px) rotateX(${y}deg) rotateY(${x}deg)`;
    });
    c.addEventListener('mouseleave',()=>c.style.transform='');
  });
}

/* ─── LIGHTBOX ─── */
let lbIdx = 0;
const total = CONFIG.portfolio.length;

function lbBuildDots(){
  const el = $('lb-dots'); if(!el) return;
  el.innerHTML = '';
  CONFIG.portfolio.forEach((_,i)=>{
    const d = document.createElement('div');
    d.className = 'lb-dot' + (i===lbIdx?' cur':'');
    d.onclick = e=>{ e.stopPropagation(); lbGo(i); };
    el.appendChild(d);
  });
}

function lbRender(dir){
  const lbImgWrap = $('lb-imgwrap');
  const lbCapEl   = $('lb-caption');
  const lbCtrEl   = $('lb-counter');
  if(!lbImgWrap) return;
  const p   = CONFIG.portfolio[lbIdx];
  const cap = LANG==='vi' ? p.captionVI : p.captionEN;
  if(lbCapEl) lbCapEl.textContent = cap;
  if(lbCtrEl) lbCtrEl.textContent = `${String(lbIdx+1).padStart(2,'0')} / ${String(total).padStart(2,'0')}`;
  const outX = dir>=0 ? '-60px' : '60px';
  lbImgWrap.style.transition = 'opacity .18s, transform .2s';
  lbImgWrap.style.opacity    = '0';
  lbImgWrap.style.transform  = `translateX(${outX}) scale(.97)`;
  setTimeout(()=>{
    const wrap = $('lb-imgwrap'); if(!wrap) return;
    if(p.url){
      wrap.innerHTML = `<img src="${p.url}" alt="${cap}">`;
    } else {
      const txt = LANG==='vi' ? 'Chưa có ảnh' : 'No image yet';
      wrap.innerHTML = `<div class="lb-empty"><span style="font-size:1.8rem;opacity:.18">◻</span><span>${txt}</span></div>`;
    }
    const inX = dir>=0 ? '50px' : '-50px';
    wrap.style.transition = 'none';
    wrap.style.transform  = `translateX(${inX}) scale(.97)`;
    wrap.style.opacity    = '0';
    requestAnimationFrame(()=>{
      wrap.style.transition = 'opacity .35s, transform .4s cubic-bezier(.23,1,.32,1)';
      wrap.style.opacity    = '1';
      wrap.style.transform  = 'translateX(0) scale(1)';
    });
  }, 190);
  document.querySelectorAll('.lb-dot').forEach((d,i)=>d.classList.toggle('cur',i===lbIdx));
}

function lbOpen(idx){
  const lbEl      = $('lb');
  const lbImgWrap = $('lb-imgwrap');
  if(!lbEl || !lbImgWrap) return;
  lbIdx = idx;
  lbEl.classList.add('open');
  document.body.style.overflow = 'hidden';
  lbBuildDots();
  lbImgWrap.style.transition = 'none';
  lbImgWrap.style.opacity    = '0';
  lbImgWrap.style.transform  = 'scale(.9) translateY(12px)';
  const p   = CONFIG.portfolio[lbIdx];
  const cap = LANG==='vi' ? p.captionVI : p.captionEN;
  const lbCapEl = $('lb-caption');
  const lbCtrEl = $('lb-counter');
  if(lbCapEl) lbCapEl.textContent = cap;
  if(lbCtrEl) lbCtrEl.textContent = `${String(lbIdx+1).padStart(2,'0')} / ${String(total).padStart(2,'0')}`;
  if(p.url){
    lbImgWrap.innerHTML = `<img src="${p.url}" alt="${cap}">`;
  } else {
    const txt = LANG==='vi' ? 'Chưa có ảnh' : 'No image yet';
    lbImgWrap.innerHTML = `<div class="lb-empty"><span style="font-size:1.8rem;opacity:.18">◻</span><span>${txt}</span></div>`;
  }
  requestAnimationFrame(()=>{
    lbImgWrap.style.transition = 'opacity .45s, transform .48s cubic-bezier(.23,1,.32,1)';
    lbImgWrap.style.opacity    = '1';
    lbImgWrap.style.transform  = 'scale(1) translateY(0)';
  });
}

function lbClose(){
  const lbEl      = $('lb');
  const lbImgWrap = $('lb-imgwrap');
  if(!lbEl) return;
  lbEl.classList.remove('open');
  document.body.style.overflow = '';
  setTimeout(()=>{ if(lbImgWrap) lbImgWrap.innerHTML=''; }, 400);
}

function lbGo(idx, dir){
  const prev = lbIdx;
  lbIdx = ((idx % total) + total) % total;
  const d = dir !== undefined ? dir : (lbIdx > prev ? 1 : -1);
  lbRender(d);
}

// bind lightbox events after DOM is ready
window.addEventListener('DOMContentLoaded', ()=>{
  const lbCloseBtn = $('lb-close');
  const lbZoneL    = $('lb-zone-l');
  const lbZoneR    = $('lb-zone-r');
  const lbOverlay  = $('lb');
  if(lbCloseBtn) lbCloseBtn.onclick = e=>{ e.stopPropagation(); lbClose(); };
  if(lbZoneL)    lbZoneL.onclick    = e=>{ e.stopPropagation(); lbGo(lbIdx-1,-1); };
  if(lbZoneR)    lbZoneR.onclick    = e=>{ e.stopPropagation(); lbGo(lbIdx+1, 1); };
  if(lbOverlay)  lbOverlay.addEventListener('click', e=>{ if(e.target===lbOverlay) lbClose(); });
});
// keyboard
document.addEventListener('keydown', e=>{
  const el = $('lb');
  if(!el || !el.classList.contains('open')) return;
  if(e.key==='Escape')     lbClose();
  if(e.key==='ArrowLeft')  lbGo(lbIdx-1,-1);
  if(e.key==='ArrowRight') lbGo(lbIdx+1, 1);
});
// swipe
let tsX=0;
document.addEventListener('touchstart', e=>{ tsX=e.touches[0].clientX; },{passive:true});
document.addEventListener('touchend',   e=>{
  const el = $('lb');
  if(!el || !el.classList.contains('open')) return;
  const dx = e.changedTouches[0].clientX - tsX;
  if(Math.abs(dx)>48){ dx<0 ? lbGo(lbIdx+1,1) : lbGo(lbIdx-1,-1); }
});

/* ─── INIT ─── */
setLang(CONFIG.defaultLang);
</script>

    <div class="lb-img-wrap" id="lb-imgwrap"></div>
    <div class="lb-zone lb-zone-r" id="lb-zone-r"></div>
  </div>
  <div class="lb-bar">
    <div class="lb-dots" id="lb-dots"></div>
    <div class="lb-meta">
      <span class="lb-caption" id="lb-caption"></span>
      <span class="lb-counter" id="lb-counter"></span>
    </div>
  </div>
</div>
